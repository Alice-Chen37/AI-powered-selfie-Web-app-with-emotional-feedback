<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI Emotion Selfie (Capture + realtime)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    video, canvas { border: 1px solid #ccc; margin-top: 10px; }
    #results p { font-size: 18px; margin: 5px 0; }
    #lineChart { max-width: 700px; margin: 20px auto; }
    button { margin: 5px; padding: 8px 12px; font-size: 16px; }
    hr { margin: 30px 0; }
  </style>
</head>
<body>
  <h1>AI Emotion Selfie App</h1>

  <!-- ================= Capture ================= -->
  <h2>📸 Capture image</h2>
  <video id="captureVideo" width="320" height="240" autoplay></video>
  <br>
  <button id="captureBtn">Capture and analysis</button>
  <canvas id="captureCanvas" width="320" height="240"></canvas>
  <div id="captureResults">
    <p id="cConfidence">Confidence: </p>
    <p id="cStress">Stress: </p>
    <p id="cEnergy">Energy: </p>
    <p id="cSuggestion">Suggestion: </p>
  </div>

  <hr>

  <!-- ================= Video  ================= -->
  <h2>🎥 Real time Video </h2>
  <video id="video" width="320" height="240" autoplay></video>
  <br>
  <button id="startBtn">Open camera</button>
  <button id="stopBtn">Close camera</button>
  <canvas id="videoCanvas" width="320" height="240"></canvas>
  <div id="videoResults">
    <p id="vConfidence">Confidence: </p>
    <p id="vStress">Stress: </p>
    <p id="vEnergy">Energy: </p>
    <p id="vSuggestion">Suggestion: </p>
  </div>
  <canvas id="lineChart" width="700" height="300"></canvas>

  <script src="app.js"></script>
</body>
</html>
